name: PR Accepted Deployment

run-name: PR #${{ github.event.pull_request.number }} merged by ${{ github.actor }}

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:

  run-snowflake-dbt-job:

    if: github.event.pull_request.merged == true

    name: Run on Accepted PR
    runs-on: ubuntu-latest
    container: 
      image: python:3.10-slim
    environment: prod

    env:
      SNOWFLAKE_CLI_FEATURES_ENABLE_DBT: true
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_DATABASE: DBT_POC
      SNOWFLAKE_SCHEMA: DBO
      SNOWFLAKE_ROLE: DBT_POC
      SNOWFLAKE_WAREHOUSE: DBT_POC

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge Audit Information
        run: |
          echo "===================================================="
          echo "PR MERGE AUDIT INFORMATION"
          echo "===================================================="

          echo "PR Number           : ${{ github.event.pull_request.number }}"
          echo "PR Title            : ${{ github.event.pull_request.title }}"
          echo "PR Created By       : ${{ github.event.pull_request.user.login }}"
          echo "Merged By           : ${{ github.actor }}"
          echo "Source Branch       : ${{ github.event.pull_request.head.ref }}"
          echo "Target Branch       : ${{ github.event.pull_request.base.ref }}"
          echo "Merge Commit SHA    : ${{ github.event.pull_request.merge_commit_sha }}"

          echo "===================================================="

      - name: Files Merged Into Main
        run: |
          echo "===================================================="
          echo "FILES MERGED INTO MAIN"
          echo "===================================================="
              
          git fetch --all
              
          git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} || true
              
          echo "===================================================="

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0
        with:
          use-oidc: true

      - name: Check Snowflake CLI Version
        run: |
          echo "===================================================="
          echo "SNOWFLAKE CLI VERSION"
          echo "===================================================="

          snow --version

          echo "===================================================="

      - name: Snowflake Connection Test
        id: connection_test
        run: |
          echo "===================================================="
          echo "DEPLOYMENT TEST 1 : SNOWFLAKE CONNECTION"
          echo "===================================================="

          snow connection test -x

          echo "===================================================="

      - name: Deploy Production DBT Project
        id: dbt_deploy
        run: |
          echo "===================================================="
          echo "DEPLOYMENT TEST 2 : PRODUCTION DBT DEPLOYMENT"
          echo "===================================================="

          snow dbt deploy tasty_bytes_dbt_object_gh_action \
            --source ./tasty_bytes_dbt_demo \
            --default-target prod \
            --dbt-version 1.10.15 \
            --force -x

          echo "===================================================="

      - name: List DBT Projects
        id: dbt_validate
        run: |
          echo "===================================================="
          echo "DEPLOYMENT TEST 3 : VALIDATE DEPLOYED PROJECTS"
          echo "===================================================="

          snow dbt list -x

          echo "===================================================="

      - name: Deployment Success
        if: success()
        run: |
          echo "===================================================="
          echo "DEPLOYMENT STATUS : SUCCESS"
          echo "===================================================="

          echo "PR Number         : ${{ github.event.pull_request.number }}"
          echo "PR Owner          : ${{ github.event.pull_request.user.login }}"
          echo "Merged By         : ${{ github.actor }}"

          echo "Environment       : PROD"

          echo "Merge Commit SHA  : ${{ github.event.pull_request.merge_commit_sha }}"

          echo ""
          echo "PASSED TESTS"
          echo "------------"
          echo "1. Snowflake Connection Test"
          echo "2. Production DBT Deployment"
          echo "3. DBT Project Validation"

          echo ""
          echo "MAIN BRANCH DEPLOYMENT COMPLETED"

          echo "===================================================="

      - name: Deployment Failure
        if: failure()
        run: |
          echo "===================================================="
          echo "DEPLOYMENT STATUS : FAILED"
          echo "===================================================="

          echo "PR Number         : ${{ github.event.pull_request.number }}"
          echo "PR Owner          : ${{ github.event.pull_request.user.login }}"
          echo "Merged By         : ${{ github.actor }}"

          echo "Environment       : PROD"

          echo "Merge Commit SHA  : ${{ github.event.pull_request.merge_commit_sha }}"

          echo ""
          echo "POSSIBLE FAILURE AREAS"
          echo "----------------------"
          echo "1. Snowflake Connection Failure"
          echo "2. Role / Permission Issues"
          echo "3. Database / Schema Missing"
          echo "4. DBT Compilation Failure"
          echo "5. DBT Deployment Failure"

          echo ""
          echo "Review logs above for exact exception message"

          echo "===================================================="

      - name: Write Audit Record to Snowflake
        if: always()
        run: |
          TESTS_PASSED=""
          TESTS_FAILED=""

          if [ "${{ steps.connection_test.outcome }}" == "success" ]; then
            TESTS_PASSED="${TESTS_PASSED}Connection Test,"
          else
            TESTS_FAILED="${TESTS_FAILED}Connection Test,"
          fi

          if [ "${{ steps.dbt_deploy.outcome }}" == "success" ]; then
            TESTS_PASSED="${TESTS_PASSED}DBT Deployment,"
          else
            TESTS_FAILED="${TESTS_FAILED}DBT Deployment,"
          fi

          if [ "${{ steps.dbt_validate.outcome }}" == "success" ]; then
            TESTS_PASSED="${TESTS_PASSED}DBT Validation,"
          else
            TESTS_FAILED="${TESTS_FAILED}DBT Validation,"
          fi

          TESTS_PASSED=$(echo "$TESTS_PASSED" | sed 's/,$//')
          TESTS_FAILED=$(echo "$TESTS_FAILED" | sed 's/,$//')

          FILES_CHANGED=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} 2>/dev/null | tr '\n' ',' | sed 's/,$//' || echo "unknown")

          STATUS="${{ job.status }}"
          STATUS_UPPER=$(echo "$STATUS" | tr '[:lower:]' '[:upper:]')

          PR_TITLE=$(echo "${{ github.event.pull_request.title }}" | sed "s/'/''/g")

          snow sql -q "
            INSERT INTO DBT_POC.AUDIT.DEPLOYMENT_AUDIT
              (EVENT_TYPE, STATUS, PR_NUMBER, PR_TITLE, PR_CREATED_BY, MERGED_BY,
               SOURCE_BRANCH, TARGET_BRANCH, COMMIT_SHA, FILES_CHANGED,
               TESTS_PASSED, TESTS_FAILED, WORKFLOW_RUN_ID, REPOSITORY)
            VALUES
              ('PROD_DEPLOYMENT', '${STATUS_UPPER}',
               ${{ github.event.pull_request.number }},
               '${PR_TITLE}',
               '${{ github.event.pull_request.user.login }}',
               '${{ github.actor }}',
               '${{ github.event.pull_request.head.ref }}',
               '${{ github.event.pull_request.base.ref }}',
               '${{ github.event.pull_request.merge_commit_sha }}',
               '${FILES_CHANGED}',
               '${TESTS_PASSED}',
               '${TESTS_FAILED}',
               '${{ github.run_id }}',
               '${{ github.repository }}')
          " -x