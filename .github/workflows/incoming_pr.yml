name: Incoming PR

run-name: PR #${{ github.event.pull_request.number }} opened by ${{ github.actor }}

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  run-snowflake-test-dbt-job:

    name: Run on Incoming PR
    runs-on: ubuntu-latest
    container: 
      image: python:3.10-slim
    environment: prod

    env:
      SNOWFLAKE_CLI_FEATURES_ENABLE_DBT: true
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_DATABASE: DBT_POC
      SNOWFLAKE_SCHEMA: DBO
      SNOWFLAKE_ROLE: DBT_POC
      SNOWFLAKE_WAREHOUSE: DBT_POC

    steps:

    - name: PR Audit Information
      run: |
        echo "===================================================="
        echo "INCOMING PR AUDIT INFORMATION"
        echo "===================================================="

        echo "PR Number           : ${{ github.event.pull_request.number }}"
        echo "PR Title            : ${{ github.event.pull_request.title }}"

        echo "PR Created By       : ${{ github.event.pull_request.user.login }}"

        echo "Current Triggered By: ${{ github.actor }}"

        echo "Source Branch       : ${{ github.head_ref }}"
        echo "Target Branch       : ${{ github.base_ref }}"

        echo "Commit SHA          : ${{ github.sha }}"
        echo "Repository          : ${{ github.repository }}"
        echo "Workflow Run ID     : ${{ github.run_id }}"
        echo "Workflow Name       : Incoming PR"

        echo "===================================================="
      
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Show Changed Files
      run: |
        echo "===================================================="
        echo "FILES INCLUDED IN THIS PR"
        echo "===================================================="

        git fetch origin ${{ github.base_ref }}

        git diff --name-only \
          origin/${{ github.base_ref }}...HEAD || true

        echo "===================================================="

    - name: Install Snowflake CLI
      uses: snowflakedb/snowflake-cli-action@v2.0
      with:
        use-oidc: true

    - name: Check Snowflake CLI Version
      run: |
        echo "===================================================="
        echo "SNOWFLAKE CLI VERSION"
        echo "===================================================="

        snow --version

        echo "===================================================="

    - name: Snowflake Connection Test
      id: connection_test
      run: |
        echo "===================================================="
        echo "TEST 1 : SNOWFLAKE CONNECTION TEST"
        echo "===================================================="

        snow connection test -x

        echo "===================================================="

    - name: Deploy Tester DBT Project
      id: dbt_deploy
      run: |
        echo "===================================================="
        echo "TEST 2 : DBT DEPLOYMENT VALIDATION"
        echo "===================================================="

        snow dbt deploy tester_tasty_bytes_dbt_project_object_gh_action \
          --source ./tasty_bytes_dbt_demo \
          --dbt-version 1.10.15 \
          --force -x

        echo "===================================================="

    - name: List DBT Projects
      id: dbt_validate
      run: |
        echo "===================================================="
        echo "TEST 3 : LIST DBT PROJECT OBJECTS"
        echo "===================================================="

        snow dbt list -x

        echo "===================================================="

    - name: Incoming PR Validation Success
      if: success()
      run: |
        echo "===================================================="
        echo "CI VALIDATION STATUS : SUCCESS"
        echo "===================================================="

        echo "PR Number     : ${{ github.event.pull_request.number }}"
        echo "PR Owner      : ${{ github.event.pull_request.user.login }}"
        echo "Commit SHA    : ${{ github.sha }}"

        echo ""
        echo "PASSED TESTS"
        echo "------------"
        echo "1. Snowflake Connection Test"
        echo "2. DBT Deployment Validation"
        echo "3. DBT Project Listing"

        echo ""
        echo "READY FOR REVIEW AND MERGE"

        echo "===================================================="

    - name: Incoming PR Validation Failure
      if: failure()
      run: |
        echo "===================================================="
        echo "CI VALIDATION STATUS : FAILED"
        echo "===================================================="

        echo "PR Number     : ${{ github.event.pull_request.number }}"
        echo "PR Owner      : ${{ github.event.pull_request.user.login }}"
        echo "Commit SHA    : ${{ github.sha }}"
        echo "Repository    : ${{ github.repository }}"

        echo ""
        echo "VALIDATION FAILED"
        echo "Review logs above to identify:"
        echo "- Snowflake Connection Issues"
        echo "- Permission Issues"
        echo "- DBT Compilation Issues"
        echo "- Deployment Issues"

        echo "===================================================="

    - name: Write Audit Record to Snowflake
      if: always()
      run: |
        TESTS_PASSED=""
        TESTS_FAILED=""

        if [ "${{ steps.connection_test.outcome }}" == "success" ]; then
          TESTS_PASSED="${TESTS_PASSED}Connection Test,"
        else
          TESTS_FAILED="${TESTS_FAILED}Connection Test,"
        fi

        if [ "${{ steps.dbt_deploy.outcome }}" == "success" ]; then
          TESTS_PASSED="${TESTS_PASSED}DBT Deployment,"
        else
          TESTS_FAILED="${TESTS_FAILED}DBT Deployment,"
        fi

        if [ "${{ steps.dbt_validate.outcome }}" == "success" ]; then
          TESTS_PASSED="${TESTS_PASSED}DBT Validation,"
        else
          TESTS_FAILED="${TESTS_FAILED}DBT Validation,"
        fi

        TESTS_PASSED=$(echo "$TESTS_PASSED" | sed 's/,$//')
        TESTS_FAILED=$(echo "$TESTS_FAILED" | sed 's/,$//')

        FILES_CHANGED=$(git diff --name-only \
          origin/${{ github.base_ref }}...HEAD 2>/dev/null | tr '\n' ',' | sed 's/,$//' || echo "unknown")

        STATUS="${{ job.status }}"
        STATUS_UPPER=$(echo "$STATUS" | tr '[:lower:]' '[:upper:]')

        PR_TITLE=$(echo "${{ github.event.pull_request.title }}" | sed "s/'/''/g")

        snow sql -q "
          INSERT INTO DBT_POC.AUDIT.DEPLOYMENT_AUDIT
            (EVENT_TYPE, STATUS, PR_NUMBER, PR_TITLE, PR_CREATED_BY, MERGED_BY,
             SOURCE_BRANCH, TARGET_BRANCH, COMMIT_SHA, FILES_CHANGED,
             TESTS_PASSED, TESTS_FAILED, WORKFLOW_RUN_ID, REPOSITORY)
          VALUES
            ('PR_VALIDATION', '${STATUS_UPPER}',
             ${{ github.event.pull_request.number }},
             '${PR_TITLE}',
             '${{ github.event.pull_request.user.login }}',
             '${{ github.actor }}',
             '${{ github.head_ref }}',
             '${{ github.base_ref }}',
             '${{ github.sha }}',
             '${FILES_CHANGED}',
             '${TESTS_PASSED}',
             '${TESTS_FAILED}',
             '${{ github.run_id }}',
             '${{ github.repository }}')
        " -x
